name: "Commit + PR"
description: "Empaqueta archivos modificados en una rama efímera y abre un PR"

inputs:
  variant_id:
    required: true
    description: "ID de la variante (ej. v0001)"
  phase_id:
    required: true 
    description: "ID de la fase (ej. f1, f2, ...) — usado para nombrar la rama"
  step:
    required: true
    description: "Nombre del step (variant | script | check | register)"
  paths:
    required: true
    description: "Paths a añadir al commit (separados por espacios, uno por línea también vale)"
  github_token:
    required: true

runs:
  using: "composite"
  steps:
    - name: Commit + PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        BRANCH_NAME: "mlops/${{ inputs.phase_id }}-${{ inputs.step }}-${{ inputs.variant_id }}-${{ github.run_id }}-${{ github.run_attempt }}"
      run: |
        set -eu

        # 1) Parsear paths multilinea en array
        readarray -t PATH_ARGS < <(xargs -n1 <<< '${{ inputs.paths }}' | awk '{$1=$1};1' | grep -v '^\s*$')
        if [[ ${#PATH_ARGS[@]} -gt 0 ]]; then
          git add -- "${PATH_ARGS[@]}" 2>/dev/null || true
        fi
        if git diff --cached --quiet; then
          echo "[INFO] Sin cambios staged para ${{ inputs.step }} — se omite PR"
          exit 0
        fi

        # 2) Rama efímera única
        git checkout -b "$BRANCH_NAME"

        # 3) Commit
        git commit -m "🤖 AutoML (${{ inputs.phase_id }}/${{ inputs.step }}): ${{ inputs.variant_id }}"

        # 4) Push con retry
        for i in 1 2 3; do
          if git push -u origin "$BRANCH_NAME"; then break; fi
          echo "[WARN] push falló intento $i, reintento…"
          sleep $((i * 3))
        done

        # 5) Detectar rama base desde setup de proyecto
        BASE_BRANCH=$(python - <<'PY'
import re, yaml
for cfg in [".mlops4ofp/setup.yaml", "MLproject"]:
    try:
        with open(cfg, encoding="utf-8") as f:
            data = yaml.safe_load(f)
            if isinstance(data, dict) and "git" in data:
                branch = str(data["git"].get("branch", "")).strip()
                if branch: print(branch); break
    except FileNotFoundError:
        pass
PY
)
        BASE_BRANCH=${BASE_BRANCH:-main}
        echo "[INFO] Base branch: $BASE_BRANCH"

        # 6) Abrir PR
        gh pr create \
          --title "🚀 AutoML ${{ inputs.phase_id }}/${{ inputs.step }}: ${{ inputs.variant_id }}" \
          --body "PR automática para la variante **${{ inputs.variant_id }}**, step **${{ inputs.step }}**." \
          --base "$BASE_BRANCH" \
          --head "$BRANCH_NAME"
        
        # 7) Obtener el número de PR
        PR_NUMBER=$(gh pr view "$BRANCH_NAME" --json number --jq .number)
        echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT