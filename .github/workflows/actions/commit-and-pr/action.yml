name: "Commit + PR con auto-merge"
description: "Empaqueta archivos modificados en una rama efímera, abre PR y activa auto-merge rebase"
inputs:
  variant_id:
    required: true
    description: "ID de la variante (ej. v0001)"
  phase_id:
    required: true
    description: "ID de la fase (ej. f1, f2, ...) — usado para nombrar la rama"
  step:
    required: true
    description: "Nombre del step (variant | script | check | register)"
  paths:
    required: true
    description: "Paths a añadir al commit (separados por espacios, uno por línea también vale)"
  base_branch:
    required: false
    default: "main"
  github_token:
    required: true
runs:
  using: "composite"
  steps:
    - name: Commit + PR con auto-merge rebase
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        BRANCH_NAME: "mlops/${{ inputs.phase_id }}-${{ inputs.step }}-${{ inputs.variant_id }}-${{ github.run_id }}-${{ github.run_attempt }}"
      run: |
        set -eu

        # 1) ¿Hay algo que commitear?
        git add -- ${{ inputs.paths }} 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "[INFO] Sin cambios staged para ${{ inputs.step }} — se omite PR"
          exit 0
        fi

        # 2) Rama efímera única (incluye run_attempt para reintentos)
        git checkout -b "$BRANCH_NAME"

        # 3) Commit
        git commit -m "🤖 AutoML (${{ inputs.phase_id }}/${{ inputs.step }}): ${{ inputs.variant_id }}"

        # 4) Push (con retry por si otra job pisó el remoto justo ahora)
        for i in 1 2 3; do
          if git push -u origin "$BRANCH_NAME"; then break; fi
          echo "[WARN] push falló intento $i, reintento…"
          sleep $((i * 3))
        done

        # 5) Abrir PR
        gh pr create \
          --title "🚀 AutoML ${{ inputs.phase_id }}/${{ inputs.step }}: ${{ inputs.variant_id }}" \
          --body "PR automática para la variante **${{ inputs.variant_id }}**, step **${{ inputs.step }}**." \
          --base "${{ inputs.base_branch }}" \
          --head "$BRANCH_NAME"

        # 6) Activar auto-merge rebase
        gh pr merge "$BRANCH_NAME" --auto --rebase --delete-branch