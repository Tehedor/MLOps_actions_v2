name: "1️⃣♻️ Reusable: Fase 1 (Explore)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      params_json:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-1:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      SKIP_GIT_PUBLISH: "1"
      SKIP_LINEAGE: "1"   
      F1_VARIANT_ROOT: executions/f01_explore/${{ inputs.variant_id }}
      F1_REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
        .tflite
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git y DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Datos Raw)
        run: dvc pull data/raw.csv.dvc

      # =========================================================
      # STEP 1: variant1 → crea params.yaml + metadata.yaml
      # =========================================================
      - name: Ejecutar make variant1
        run: |
          python - <<'PY'
          import json, subprocess
          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}
          extra_args = [f"{str(k).strip()}={v}" for k, v in params.items() if str(k).strip()]
          print("Ejecutando con:", " ".join(extra_args))
          subprocess.run(
              ["make", "variant1", "VARIANT=${{ inputs.variant_id }}", *extra_args],
              check=True,
          )
          PY

      - name: PR — publicar variant
        id: pr-variant
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f1
          step: variant
          paths: |
            executions/f01_explore/${{ inputs.variant_id }}/params.yaml
            executions/f01_explore/${{ inputs.variant_id }}/metadata.yaml
            executions/f01_explore/${{ inputs.variant_id }}/creation_context.yaml
          github_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-variant.outputs.PR_NUMBER }}" --squash --delete-branch

      # =========================================================
      # STEP 2: script1 → actualiza metadata.yaml (lifecycle_state)
      # =========================================================
      - name: Run Script1
        run: make script1 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar script
        id: pr-script 
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f1
          step: script
          paths: |
            executions/f01_explore/${{ inputs.variant_id }}/metadata.yaml
            executions/f01_explore/${{ inputs.variant_id }}/outputs.yaml
          github_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Merge PR de script
        if: ${{ always() && steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-script.outputs.PR_NUMBER }}" --squash --delete-branch

      # =========================================================
      # STEP 3: check1 → actualiza metadata.yaml (verified) 
      # =========================================================
      - name: Run Check1
        run: make check1 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar check
        id: pr-check
        if: always()  # Siempre crear el PR para actualizar el estado
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f1
          step: check
          paths: |
            executions/f01_explore/${{ inputs.variant_id }}/metadata.yaml
          github_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-check.outputs.PR_NUMBER }}" --squash --delete-branch

      # =========================================================
      # STEP 4: register1 → DVC add + DVC push + metadata.yaml
      # =========================================================
      - name: Run Register1 
        run: make register1 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f1
          step: register
          paths: |
            ${{ env.F1_VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Merge PR de register  
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-register.outputs.PR_NUMBER }}" --squash --delete-branch