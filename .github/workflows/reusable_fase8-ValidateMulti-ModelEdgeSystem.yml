name: "8️⃣♻️ Reusable: Fase 8 (Validate Multi-Model Edge System)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parents_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string
      checkout_branch:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: '["self-hosted", "Linux", "X64", "self-hosted-tehelab"]'

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-8:
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f08_multimodel/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .csv
        .json
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activar Entorno Virtual (Añadir al PATH)
        run: echo "$HOME/.venv/bin" >> $GITHUB_PATH

      - name: Configurar Git, sincronizar Fase 7 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 7)
        run: |
          python - <<'PY'
          import json
          import subprocess

          raw = '''${{ inputs.parents_variant }}'''.strip()

          def normalize_parents(value: str) -> list[str]:
            if not value:
              return []
            if value.startswith("["):
              try:
                parsed = json.loads(value)
                if isinstance(parsed, list):
                  return [str(x).strip() for x in parsed if str(x).strip()]
              except Exception:
                pass
            return [item.strip() for item in value.split(",") if item.strip()]

          parents = normalize_parents(raw)
          if not parents:
            print("[WARN] parents_variant vacío; no se ejecuta DVC pull")

          for parent in parents:
            cmd = ["dvc", "pull", f"executions/f07_modval/{parent}/*.dvc"]
            print("[INFO] Ejecutando:", " ".join(cmd))
            subprocess.run(cmd, check=False)
          PY

      # =========================================================
      # STEP 1: variant8
      # =========================================================
      - name: Crear variante Fase 8
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          def to_make_value(value):
              if isinstance(value, bool):
                  return "true" if value else "false"
              if isinstance(value, (list, dict)):
                  return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              return str(value)

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          raw_parents = '''${{ inputs.parents_variant }}'''.strip()

          def normalize_parents(value: str) -> list[str]:
              if not value:
                  return []
              if value.startswith("["):
                  try:
                      parsed = json.loads(value)
                      if isinstance(parsed, list):
                          return [str(x).strip() for x in parsed if str(x).strip()]
                  except Exception:
                      pass
              return [item.strip() for item in value.split(",") if item.strip()]

          parents_list = normalize_parents(raw_parents)
          if not parents_list:
              raise RuntimeError("parents_variant vacío o inválido")

          parents_make_value = json.dumps(parents_list, ensure_ascii=False)

          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass

          if not isinstance(params, dict):
              print(f"[WARN] params no es dict, asumiendo dict vacío. Type={type(params)}")
              params = {}

          extra_args = []
          for key, value in params.items():
              k = str(key).strip()
              if not k:
                  continue
              extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
              [
                  "make",
                  "variant8",
                  "VARIANT=${{ inputs.variant_id }}",
                f"PARENTS={parents_make_value}",
                  *extra_args,
              ],
              check=True,
          )
          PY

      - name: PR — publicar variant
        id: pr-variant
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f8
          step: variant
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-variant.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 2: script8
      # =========================================================
      - name: Ejecutar script de Fase 8
        env:
          PYTHONFAULTHANDLER: 1
        run: make script8 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar script
        id: pr-script
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f8
          step: script
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-script.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 3: check8
      # =========================================================
      - name: Verificar resultados
        run: make check8 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar check
        id: pr-check
        if: always()
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f8
          step: check
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-check.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 4: register8
      # =========================================================
      - name: Registrar resultados de F8
        run: make register8 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f8
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-register.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done
