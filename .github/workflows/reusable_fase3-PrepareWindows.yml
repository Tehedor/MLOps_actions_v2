name: "3锔忊儯鈾伙笍 Reusable: Fase 3 (Prepare Windows)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string

jobs:
  ejecutar-fase-3:
    runs-on: [self-hosted, Linux, X64, self-hosted-tehelab]
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configurar Git, sincronizar Fase 2 y configurar DVC
        run: |
          . /opt/.venv/bin/activate
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          git pull origin main --rebase
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 2)
        run: dvc pull executions/02_prepareeventsds/${{ inputs.parent_variant }}/*.dvc

      - name: Crear variante Fase 3
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          # Soporta casos donde params_json llegue serializado dos veces.
          if isinstance(params, str):
            try:
              params = json.loads(params)
            except Exception:
              pass

          if not isinstance(params, dict):
            print("[ERROR] 'params_json' debe representar un objeto JSON (dict)")
            sys.exit(1)

          def to_make_value(value):
            if isinstance(value, bool):
              return "true" if value else "false"
            if isinstance(value, (list, dict)):
              return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
            return str(value)

          extra_args = []
          for key, value in params.items():
            k = str(key).strip()
            if not k:
              continue
            extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
            [
              "make",
              "variant3",
              "VARIANT=${{ inputs.variant_id }}",
              "PARENT=${{ inputs.parent_variant }}",
              *extra_args,
            ],
            check=True,
          )
          PY

      - name: Ejecutar script de Fase 3
        run: make script3 VARIANT=${{ inputs.variant_id }}

      - name: Verificar resultados de Fase 3
        run: make check3 VARIANT=${{ inputs.variant_id }}

      - name: Registrar resultados de Fase 3
        run: make register3 VARIANT=${{ inputs.variant_id }}

      # - name: Empujar resultados de F3 a Git
      #   run: git push origin HEAD:main