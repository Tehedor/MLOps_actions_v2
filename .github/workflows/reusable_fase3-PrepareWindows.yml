name: "3️⃣♻️ Reusable: Fase 3 (Prepare Windows)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string

jobs:
  ejecutar-fase-3:
    runs-on: [self-hosted, Linux, X64, self-hosted-tehelab]
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configurar Git, sincronizar Fase 2 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          git pull origin main --rebase
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 2)
        run: dvc pull executions/02_prepareeventsds/${{ inputs.parent_variant }}/*.dvc

      - name: Crear variante Fase 3
        run: |
          python - <<'PY'
          import json
          import subprocess

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          extra_args = []
          for key, value in params.items():
            k = str(key).strip()
            if not k:
              continue
            extra_args.append(f"{k}={value}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
            [
              "make",
              "variant3",
              "VARIANT=${{ inputs.variant_id }}",
              "PARENT=${{ inputs.parent_variant }}",
              *extra_args,
            ],
            check=True,
          )

      - name: Ejecutar script de Fase 3 (Con monitor de RAM)
        env:
          PYTHONFAULTHANDLER: 1
        run: |
          (while true; do echo "[$(date '+%H:%M:%S')] RAM Libre:"; free -m | grep Mem; sleep 10; done) &
          MONITOR_PID=$!
          make script3-run VARIANT=${{ inputs.variant_id }}
          kill $MONITOR_PID

      - name: Diagnostico de error (Solo si falla)
        if: failure()
        run: |
          echo "==== BUSCANDO ERRORES DE OUT OF MEMORY (OOM) ===="
          dmesg -T | grep -i -E "killed|oom|out of memory" || echo "No hay logs de OOM en dmesg."
          free -m

      - name: Verificar y Publicar resultados
        run: |
          make script3-check-results VARIANT=${{ inputs.variant_id }}
          make publish3 VARIANT=${{ inputs.variant_id }}

      - name: Empujar resultados de F3 a Git
        run: git push origin HEAD:main