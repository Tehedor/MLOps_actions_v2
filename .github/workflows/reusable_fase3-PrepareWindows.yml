name: "3️⃣♻️ Reusable: Fase 3 (Prepare Windows)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-3:
    runs-on: ubuntu-latest
    # runs-on: [self-hosted, self-hosted-k3s-m2]
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f03_windows/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
        .tflite
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: test

      - name: Configurar Git, sincronizar Fase 2 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 2)
        run: dvc pull executions/f02_events/${{ inputs.parent_variant }}/*.dvc

      - name: Crear variante Fase 3
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          # Soporta casos donde params_json llegue serializado dos veces.
          if isinstance(params, str):
            try:
              params = json.loads(params)
            except Exception:
              pass

          if not isinstance(params, dict):
            print("[ERROR] 'params_json' debe representar un objeto JSON (dict)")
            sys.exit(1)

          def to_make_value(value):
            if isinstance(value, bool):
              return "true" if value else "false"
            if isinstance(value, (list, dict)):
              return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
            return str(value)

          extra_args = []
          for key, value in params.items():
            k = str(key).strip()
            if not k:
              continue
            extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
            [
              "make",
              "variant3",
              "VARIANT=${{ inputs.variant_id }}",
              "PARENT=${{ inputs.parent_variant }}",
              *extra_args,
            ],
            check=True,
          )
          PY

      - name: Ejecutar script de Fase 3
        run: make script3 VARIANT=${{ inputs.variant_id }}

      - name: Verificar resultados de Fase 3
        run: make check3 VARIANT=${{ inputs.variant_id }}

      - name: Registrar resultados de Fase 3
        run: make register3 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f3
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-register.outputs.PR_NUMBER }}" --squash --delete-branch
