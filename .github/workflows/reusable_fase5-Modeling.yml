name: "5️⃣♻️ Reusable: Fase 5 (Modeling)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string

jobs:
  ejecutar-fase-5:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configurar Git, sincronizar Fase 4 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          git pull origin main --rebase
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 4)
        run: dvc pull executions/04_targetengineering/${{ inputs.parent_variant }}/*.dvc

      - name: Ejecutar Fase 5 (Variante, Script, Check)
        run: |
          python - <<'PY'
          import json
          import subprocess

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          extra_args = []
          for key, value in params.items():
            k = str(key).strip()
            if not k:
              continue
            extra_args.append(f"{k}={value}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
            [
              "make",
              "variant5",
              "VARIANT=${{ inputs.variant_id }}",
              "PARENT=${{ inputs.parent_variant }}",
              *extra_args,
            ],
            check=True,
          )
          subprocess.run(["make", "script5-run", "VARIANT=${{ inputs.variant_id }}"], check=True)
          subprocess.run(["make", "script5-check-results", "VARIANT=${{ inputs.variant_id }}"], check=True)
          PY

      - name: Publicar Variante
        run: make publish5 VARIANT=${{ inputs.variant_id }}

      - name: Empujar resultados de F5 a Git
        run: git push origin HEAD:main