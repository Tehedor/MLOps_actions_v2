name: "5️⃣♻️ Reusable: Fase 5 (Modeling)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string
      checkout_branch:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-5:
    runs-on: ${{ fromJSON(inputs.runner) }}
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f05_modeling/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git, sincronizar Fase 4 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 4)
        run: dvc pull executions/f04_targets/${{ inputs.parent_variant }}/*.dvc

      # =========================================================
      # STEP 1: variant5
      # =========================================================
      - name: Ejecutar Fase 5 (Variante)
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          def to_make_value(value):
              if isinstance(value, bool):
                  return "true" if value else "false"
              if isinstance(value, (list, dict)):
                  return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              return str(value)

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass

          if not isinstance(params, dict):
              print(f"[WARN] params no es dict, asumiendo dict vacío. Type={type(params)}")
              params = {}

          extra_args = []
          for key, value in params.items():
              k = str(key).strip()
              if not k:
                  continue
              extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
              [
                  "make",
                  "variant5",
                  "VARIANT=${{ inputs.variant_id }}",
                  "PARENT=${{ inputs.parent_variant }}",
                  *extra_args,
              ],
              check=True,
          )
          PY

      - name: PR — publicar variant
        id: pr-variant
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f5
          step: variant
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-variant.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 2: script5
      # =========================================================
      - name: Ejecutar script de Fase 5
        env:
          PYTHONFAULTHANDLER: 1
        run: make script5-a VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar script
        id: pr-script
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f5
          step: script
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-script.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 3: check5
      # =========================================================
      - name: Verificar resultados
        run: make check5 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar check
        id: pr-check
        if: always()
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f5
          step: check
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-check.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 4: register5
      # =========================================================
      - name: Registrar resultados de F5
        run: make register5 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f5
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-register.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done
