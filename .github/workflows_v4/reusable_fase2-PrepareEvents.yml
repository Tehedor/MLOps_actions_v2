name: "2пёҸвғЈвҷ»пёҸ Reusable: Fase 2 (Prepare Events)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string
      checkout_branch:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-2:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f02_events/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .parquet
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git, sincronizar Fase 1 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 1)
        run: dvc pull executions/f01_explore/${{ inputs.parent_variant }}/*.dvc

      # =========================================================
      # STEP 1: variant2
      # =========================================================
      - name: Crear variante Fase 2
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          if isinstance(params, str):
            try:
              params = json.loads(params)
            except Exception:
              pass

          if not isinstance(params, dict):
            print("[ERROR] 'params_json' debe representar un objeto JSON (dict)")
            sys.exit(1)

          def to_make_value(value):
            if isinstance(value, bool):
              return "true" if value else "false"
            if isinstance(value, (list, dict)):
              return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
            return str(value)

          extra_args = []
          for key, value in params.items():
            k = str(key).strip()
            if not k:
              continue
            extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
            [
              "make",
              "variant2",
              "VARIANT=${{ inputs.variant_id }}",
              "PARENT=${{ inputs.parent_variant }}",
              *extra_args,
            ],
            check=True,
          )
          PY

      - name: PR вҖ” publicar variant
        id: pr-variant
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f2
          step: variant
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-variant.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge fallГі intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge fallГі tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 2: script2
      # =========================================================
      - name: Run Script2
        run: make script2 VARIANT=${{ inputs.variant_id }}

      - name: PR вҖ” publicar script
        id: pr-script
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f2
          step: script
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-script.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge fallГі intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge fallГі tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 3: check2
      # =========================================================
      - name: Run Check2
        run: make check2 VARIANT=${{ inputs.variant_id }}

      - name: PR вҖ” publicar check
        id: pr-check
        if: always()
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f2
          step: check
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-check.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge fallГі intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge fallГі tras 5 intentos" >&2; exit 1; }
          done

      # =========================================================
      # STEP 4: register2
      # =========================================================
      - name: Run Register2
        run: make register2 VARIANT=${{ inputs.variant_id }}

      - name: PR вҖ” publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f2
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-register.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge fallГі intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge fallГі tras 5 intentos" >&2; exit 1; }
          done
