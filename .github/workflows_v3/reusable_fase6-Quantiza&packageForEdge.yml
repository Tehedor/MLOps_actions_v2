name: "6️⃣♻️ Reusable: Fase 6 (Quantize & Package for Edge)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string

      checkout_branch:
        required: true
        type: string
permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-6:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f06_quant/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
        .tflite
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}

      - name: Configurar Git, sincronizar Fase 5 y configurar DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          # git pull origin main --rebase
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 5)
        run: dvc pull executions/f05_modeling/${{ inputs.parent_variant }}/*.dvc

      - name: Crear variante Fase 6
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          def to_make_value(value):
              """Convierte valores Python a argumentos seguros para make."""
              if isinstance(value, bool):
                  return "true" if value else "false"
              if isinstance(value, (list, dict)):
                  return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              return str(value)

          raw = '''${{ inputs.params_json }}'''.strip()
          params = json.loads(raw) if raw else {}

          # Fallback por doble-serialización (si params llegó como string)
          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass

          if not isinstance(params, dict):
              print(f"[WARN] params no es dict, asumiendo dict vacío. Type={type(params)}")
              params = {}

          extra_args = []
          for key, value in params.items():
              k = str(key).strip()
              if not k:
                  continue
              extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
              [
                  "make",
                  "variant6",
                  "VARIANT=${{ inputs.variant_id }}",
                  "PARENT=${{ inputs.parent_variant }}",
                  *extra_args,
              ],
              check=True,
          )
          PY

      - name: Ejecutar script de Fase 6
        env:
          PYTHONFAULTHANDLER: 1
        run: |
          make script6-a VARIANT=${{ inputs.variant_id }}

      - name: Verificar resultados
        run: |
          make check6 VARIANT=${{ inputs.variant_id }}

      - name: Registrar resultados de F6
        run: |
          make register6 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: ./.github/actions/commit-and-pr
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f6
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr-register.outputs.PR_NUMBER }}" --squash --delete-branch
